name: Staging CD Pipeline

on:
  push:
    branches:
      - staging

jobs:
  deploy-to-render:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger Render Staging Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING_URL }}"

      - name: Confirm Deployment
        run: echo "Deployment to staging environment completed at $(date)"