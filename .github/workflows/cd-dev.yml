name: Development CD Pipeline

on:
  push:
    branches:
      - development

jobs:
  deploy-to-render:
    runs-on: ubuntu-latest
    # Step 2 – Declare the target GitHub Environment to inject secrets
    environment: development

    steps:
      # Step 1 – Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 3 – Send an HTTP POST request to Render Deploy Hook URL
      - name: Trigger Render Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DEV_URL }}"

      # Step 4 – Output a timestamped deployment confirmation message
      - name: Confirm Deployment
        run: |
          echo "Deployment to development environment triggered at $(date)"